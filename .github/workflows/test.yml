name: tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lua:
    name: Lua addon tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Lua 5.1
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - name: Syntax-check every Lua file
        run: |
          fail=0
          while IFS= read -r -d '' file; do
            if ! luac5.1 -p "$file"; then
              echo "SYNTAX FAIL: $file"
              fail=1
            fi
          done < <(find . -name '*.lua' -print0)
          exit "$fail"

      - name: Run test suite with coverage gate
        env:
          LUAC: luac5.1
        run: lua5.1 tests/run.lua
