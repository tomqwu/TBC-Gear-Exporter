name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build + publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and tag
        id: version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          lower_tag="${tag,,}"
          if [[ "$lower_tag" == *alpha* || "$lower_tag" == *beta* || "$lower_tag" == *dev* ]]; then
            prerelease="true"
          else
            prerelease="false"
          fi
          {
            echo "tag=$tag"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$tag prerelease=$prerelease"

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          version_no_v="${{ steps.version.outputs.tag }}"
          version_no_v="${version_no_v#v}"
          awk -v ver="$version_no_v" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            flag && /^## \[/         { flag = 0 }
            flag                     { print }
          ' CHANGELOG.md > /tmp/notes.md
          if [[ ! -s /tmp/notes.md ]]; then
            printf '_No notes found in CHANGELOG.md. Commit summary:_\n\n%s\n' \
              "$(git log -1 --pretty=format:'%s%n%n%b')" > /tmp/notes.md
          fi
          {
            echo ""
            echo "### How to test"
            echo ""
            echo "1. Download \`TBCGearExporter-${{ steps.version.outputs.tag }}.zip\` below."
            echo "2. Extract so \`TBCGearExporter.toc\` lives at \`<WoW>/_anniversary_/Interface/AddOns/TBCGearExporter/TBCGearExporter.toc\`."
            echo "3. Restart WoW or run \`/reload\`."
            echo "4. Use \`/tbcgear gui\` to open the AI-ready export window."
          } >> /tmp/notes.md
          cat /tmp/notes.md

      - name: Build addon zip
        id: zip
        run: |
          set -euo pipefail
          mkdir -p .release
          out=".release/TBCGearExporter-${{ steps.version.outputs.tag }}.zip"
          zip -r "$out" TBCGearExporter \
            -x 'TBCGearExporter/Tests/*' \
            -x 'TBCGearExporter/.*' \
            -x '*.luacov.*'
          echo "path=$out" >> "$GITHUB_OUTPUT"
          unzip -l "$out"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TBCGearExporter ${{ steps.version.outputs.tag }}
          body_path: /tmp/notes.md
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          files: ${{ steps.zip.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
